<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Next2Human — {% block title %}Dashboard{% endblock %}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <script src="https://unpkg.com/htmx.org@1.9.10"></script>
  <style>
    .sidebar-link { @apply flex items-center gap-3 px-3 py-2 rounded-lg text-sm text-gray-400 hover:bg-gray-800 hover:text-white transition; }
    .sidebar-link.active { @apply bg-gray-800 text-white font-medium; }
  </style>
</head>
<body class="bg-gray-950 text-gray-100 min-h-screen flex">

  <!-- Sidebar -->
  <aside class="w-56 bg-gray-900 border-r border-gray-800 flex flex-col min-h-screen fixed left-0 top-0">
    <!-- Logo -->
    <div class="px-4 py-5 border-b border-gray-800">
      <p class="font-bold text-white text-base">Next2Human</p>
      <p class="text-xs text-gray-500">Operations Center</p>
    </div>

    <!-- Nav -->
    <nav class="flex-1 p-3 space-y-1">
      <a href="/dashboard" class="sidebar-link {% if active_page == 'home' %}active{% endif %}">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg>
        Overview
      </a>
      <a href="/dashboard/leads" class="sidebar-link {% if active_page == 'leads' %}active{% endif %}">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
        Leads
      </a>
      <a href="/dashboard/monitor" class="sidebar-link {% if active_page == 'monitor' %}active{% endif %}">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/></svg>
        Monitor
      </a>
      <a href="/dashboard/services" class="sidebar-link {% if active_page == 'services' %}active{% endif %}">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 12h14M5 12a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v4a2 2 0 01-2 2M5 12a2 2 0 00-2 2v4a2 2 0 002 2h14a2 2 0 002-2v-4a2 2 0 00-2-2"/></svg>
        Services
      </a>
    </nav>

    <!-- User -->
    <div class="p-3 border-t border-gray-800">
      <a href="/dashboard/logout" class="sidebar-link text-red-400 hover:text-red-300 hover:bg-red-950/30">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/></svg>
        Logout
      </a>
    </div>
  </aside>

  <!-- Main content -->
  <div class="ml-56 flex-1 flex flex-col min-h-screen">
    <!-- Top bar -->
    <header class="bg-gray-900 border-b border-gray-800 px-6 py-3 flex items-center justify-between">
      <h1 class="font-semibold text-white">{% block heading %}Dashboard{% endblock %}</h1>
      <div class="flex items-center gap-3">
        <span class="text-xs text-gray-500" id="last-updated">Updated just now</span>
        <button onclick="window.location.reload()" class="text-xs bg-gray-800 hover:bg-gray-700 px-3 py-1 rounded-lg text-gray-300">↻ Refresh</button>
      </div>
    </header>

    <main class="p-6 flex-1">
      {% block content %}{% endblock %}
    </main>
  </div>

  <script>
    // Update timestamp
    document.getElementById('last-updated').textContent = 'Updated ' + new Date().toLocaleTimeString();
  </script>
  {% block scripts %}{% endblock %}
</body>
</html>
