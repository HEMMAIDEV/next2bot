<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Next2Human — {% block title %}Dashboard{% endblock %}</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-950 text-gray-100 min-h-screen">

  <!-- Navbar -->
  <nav class="bg-gray-900 border-b border-gray-800 px-6 py-3 flex items-center justify-between">
    <div class="flex items-center gap-6">
      <span class="font-bold text-white text-lg">Next2Human</span>
      <a href="/dashboard/leads"   class="text-sm text-gray-400 hover:text-white {% if request.url.path.startswith('/dashboard/leads') %}text-white font-semibold{% endif %}">Leads</a>
      <a href="/dashboard/monitor" class="text-sm text-gray-400 hover:text-white {% if request.url.path == '/dashboard/monitor' %}text-white font-semibold{% endif %}">Monitor</a>
    </div>
    <a href="/dashboard/logout" class="text-xs text-gray-500 hover:text-red-400">Logout</a>
  </nav>

  <!-- Content -->
  <main class="p-6">
    {% block content %}{% endblock %}
  </main>

</body>
</html>
