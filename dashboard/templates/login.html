<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Next2Human — Login</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-950 text-gray-100 min-h-screen flex items-center justify-center">
  <div class="w-full max-w-sm">
    <div class="text-center mb-8">
      <h1 class="text-2xl font-bold text-white">Next2Human</h1>
      <p class="text-gray-400 text-sm mt-1">Internal Operations Dashboard</p>
    </div>
    <form method="POST" action="/dashboard/login" class="bg-gray-900 rounded-xl p-8 space-y-4 border border-gray-800">
      {% if error %}
      <div class="bg-red-900/40 text-red-400 text-sm px-4 py-2 rounded-lg">{{ error }}</div>
      {% endif %}
      <div>
        <label class="block text-xs text-gray-400 mb-1">Username</label>
        <input name="username" type="text" required
          class="w-full bg-gray-800 border border-gray-700 rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-blue-500">
      </div>
      <div>
        <label class="block text-xs text-gray-400 mb-1">Password</label>
        <input name="password" type="password" required
          class="w-full bg-gray-800 border border-gray-700 rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-blue-500">
      </div>
      <button type="submit"
        class="w-full bg-blue-600 hover:bg-blue-500 text-white font-semibold py-2 rounded-lg text-sm transition">
        Sign In
      </button>
    </form>
  </div>
</body>
</html>
